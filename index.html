<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raytown Construction | Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="full-screen-center">
    <div class="login-wrapper">
        <h1 class="brand-title">RAYTOWN HQ</h1>
        <p class="brand-subtitle">Operator Authentication</p>
        
        <div class="input-group">
            <input type="text" id="upland-ign" placeholder="Upland IGN" required>
            <input type="email" id="operator-email" placeholder="Email Address" required>
        </div>
        
        <button class="action-btn" id="login-btn" onclick="enterHQ()">INITIALIZE SESSION</button>
        <p class="footer-note">Raytown Network © 2026</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://fjbwugejjlieqqufmiya.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqYnd1Z2VqamxpZXFxdWZtaXlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NDExOTIsImV4cCI6MjA5MjUxNzE5Mn0.KZ0L2ds7egV2hksbNpU4bA-oCjRTsJYVOy4vlbZq3M8';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function enterHQ() {
            const ign = document.getElementById('upland-ign').value.trim();
            const email = document.getElementById('operator-email').value.trim();
            const btn = document.getElementById('login-btn');

            if (!ign || !email) return alert("IGN and Email required.");

            btn.innerText = "AUTHENTICATING...";
            btn.disabled = true;

            localStorage.setItem('raytown_ign', ign);
            localStorage.setItem('raytown_email', email);

            const { error } = await supabase.from('operators').upsert({ 
                upland_ign: ign, 
                email: email 
            }, { onConflict: 'upland_ign' });

            if (error) {
                alert("Vault Error: " + error.message);
                btn.innerText = "INITIALIZE SESSION";
                btn.disabled = false;
            } else {
                window.location.href = 'hq.html';
            }
        }
    </script>
</body>
</html>
